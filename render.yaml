services:
  - type: web
    name: operator
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: OPERATOR_GATEWAY_PORT
        value: "8080"
      - key: OPERATOR_STATE_DIR
        value: /data/.operator
      - key: OPERATOR_WORKSPACE_DIR
        value: /data/workspace
      - key: OPERATOR_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: operator-data
      mountPath: /data
      sizeGB: 1
