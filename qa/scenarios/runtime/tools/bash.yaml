title: "Runtime tool fixture — bash"

scenario:
  id: runtime-tool-bash
  surface: runtime-tools
  runtimeParityTier: standard
  coverage:
    primary:
      - tools.bash
  objective: Verify shell command behavior is tracked across Operator and Codex while Codex owns exec/process natively.
  successCriteria:
    - Operator may expose Operator exec while Codex app-server mode may omit duplicate Operator dynamic exec/process.
    - Mock provider exec plans are reported as fixture intent, not as actual runtime tool calls.
    - The row stays report-only until the fixture validates native Codex command behavior directly.
  docsRefs:
    - qa/scenarios/index.yaml
  codeRefs:
    - src/agents/agent-tools.ts
    - src/agents/bash-tools.schemas.ts
    - extensions/qa-lab/src/runtime-tool-fixture.ts
  execution:
    kind: flow
    summary: Exercise the bash family through the Operator exec tool.
    config:
      toolName: exec
      toolCoverage:
        family: bash
        actualTool: exec
        bucket: codex-native-workspace
        expectedLayer: codex-native-workspace
        required: true
        tracking: "#80319"
        codexDefaultImpact: P4
        qaImpact: P1
        action: split native command behavior from Operator dynamic tool parity
        reason: Codex app-server intentionally owns command execution natively; the fixture must not require Operator dynamic exec exposure.
      knownHarnessGap:
        issue: "#80319"
        reason: QA tool-defaults currently needs native command behavior coverage instead of Operator dynamic exec exposure.
      promptSnippet: "target=exec"
      failurePromptSnippet: "failure target=exec"

flow:
  steps:
    - name: exercises bash happy and failure paths
      actions:
        - call: runRuntimeToolFixture
          saveAs: result
          args:
            - ref: env
            - ref: config
      detailsExpr: result
