parent_config: ../../config/swiftlint.yml

included:
  - Sources
  - ShareExtension
  - ActivityWidget
  - WatchApp
  - ../shared/OperatorKit/Sources/OperatorChatUI
  - ../shared/OperatorKit/Sources/OperatorKit
  - ../shared/OperatorKit/Sources/OperatorProtocol
  - ../swabble/Sources/SwabbleKit

excluded:
  - ../macos
  - ../macos-mlx-tts
  - ../shared/OperatorKit/Sources/OperatorProtocol/GatewayModels.swift

type_body_length:
  warning: 900
  error: 1300

custom_rules:
  operator_design_colors:
    name: "Operator design colors"
    excluded:
      - Sources/Design/OperatorBrand.swift
      - ../shared/OperatorKit/Sources/OperatorChatUI/ChatTheme.swift
    regex: '(Color\.accentColor|(^|[^A-Za-z0-9_])\.accentColor\b|Color\.(red|green|orange|cyan|blue|yellow|purple|pink)\b|\.(foregroundStyle|tint|fill|stroke|strokeBorder|background)\(\s*\.(red|green|orange|cyan|blue|yellow|purple|pink)\b|Color\(red:\s*0\s*/\s*255\.0,\s*green:\s*122\s*/\s*255\.0,\s*blue:\s*255\s*/\s*255\.0\))'
    message: "Use OperatorBrand or OperatorChatTheme design tokens instead of raw accent/status colors."
    severity: error
